# 出厂检测标准配置 (Sample Config)

# 硬件检测配置 (HardwarePlugin)
hardware:
  min_cpu_cores: 4
  min_memory_gb: 8
  min_disk_gb: 100

# 网络检测配置 (NetworkPlugin)
network:
  interfaces:
    - name: "eth0"
      expected_ip_prefix: "192.168.1"
    - name: "lo"
      expected_ip_prefix: "127.0.0"
  default_gateway: "192.168.1.1"

# 服务检测配置 (ServicePlugin)
service:
  items:
    - name: "nginx"
      min_version: "1.18.0"
    - name: "docker"
      min_version: "20.10.0"
    - name: "ssh"
      check_only: true

# 路由检测配置 (RoutePlugin)
route:
  max_default_routes: 1

