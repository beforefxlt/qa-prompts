version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: family-health-postgres
    environment:
      POSTGRES_DB: family_health
      POSTGRES_USER: family_health
      POSTGRES_PASSWORD: family_health
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: family-health-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: family-health-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
