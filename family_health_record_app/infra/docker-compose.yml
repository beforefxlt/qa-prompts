version: "3.9"

x-proxy-env: &proxy-env
  HTTP_PROXY: http://127.0.0.1:10800
  HTTPS_PROXY: http://127.0.0.1:10800
  http_proxy: http://127.0.0.1:10800
  https_proxy: http://127.0.0.1:10800

services:
  db:
    image: postgres:16-alpine
    container_name: health-record-db
    environment:
      POSTGRES_DB: health_record
      POSTGRES_USER: health_record
      POSTGRES_PASSWORD: health_record_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_record"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: health-record-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: http://127.0.0.1:10800
        HTTPS_PROXY: http://127.0.0.1:10800
    container_name: health-record-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://health_record:health_record_password@db:5432/health_record
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: health-records
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY}
      OCR_MODEL_NAME: deepseek-ai/DeepSeek-OCR
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: http://127.0.0.1:10800
        HTTPS_PROXY: http://127.0.0.1:10800
    container_name: health-record-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
