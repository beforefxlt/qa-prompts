services:
  db:
    image: postgres:16-alpine
    container_name: health-record-db
    environment:
      POSTGRES_DB: health_record
      POSTGRES_USER: health_record
      POSTGRES_PASSWORD: health_record_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_record"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: health-record-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: qa-backend:latest
    container_name: health-record-backend
    working_dir: /app/backend
    volumes:
      - ../backend:/app/backend
    environment:
      DATABASE_URL: postgresql+asyncpg://health_record:health_record_password@db:5432/health_record
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: health-records
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY}
      OCR_MODEL_NAME: Qwen/Qwen2.5-VL-32B-Instruct
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: qa-frontend:latest
    container_name: health-record-frontend
    working_dir: /app/frontend
    volumes:
      - ../frontend/src:/app/frontend/src
      - ../frontend/public:/app/frontend/public
      - ../frontend/package.json:/app/frontend/package.json
      - ../frontend/package-lock.json:/app/frontend/package-lock.json
      - ../frontend/next.config.ts:/app/frontend/next.config.ts
      - ../frontend/tsconfig.json:/app/frontend/tsconfig.json
      - ../frontend/tailwind.config.ts:/app/frontend/tailwind.config.ts
      - ../frontend/postcss.config.mjs:/app/frontend/postcss.config.mjs
      - ../frontend/.eslintrc.json:/app/frontend/.eslintrc.json
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3001:3001"
    depends_on:
      - backend
    command: sh -c "rm -rf .next && npm run build && npm start -- -p 3001"

volumes:
  postgres_data:
  minio_data:
